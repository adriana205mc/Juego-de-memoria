<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria</title>
    <link rel="icon" type="image/icon" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Scooby Doo!!</h1>
    <!-- Área de estadísticas para mostrar intentos -->
    <div id="stats">0 intentos</div>
    <!-- Botón para reiniciar el juego -->
    <button class="repeatButton">Repetir</button>

    <div id="wrapper">
        <div id="game">
            <div class="card">
                <div class="face front"></div>
                <div class="face back"></div>
            </div>
        </div>
    </div>

    <div id="timeCounter">00:00:00</div>

    <audio id="music" loop autoplay>
        <source src="Scooby Doo, Where Are You.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento audio.
    </audio>
    
    <script src="main.js"></script>
</body>
</html>
